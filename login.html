<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicWatch - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --civic-blue: #3b82f6;
            --civic-blue-hover: #2563eb;
            --civic-green: #10b981;
            --civic-green-hover: #059669;
            --civic-orange: #f59e0b;
            --civic-purple: #8b5cf6;
            --background: #ffffff;
            --foreground: #374151;
            --muted: #f3f4f6;
            --muted-foreground: #6b7280;
            --card: #ffffff;
            --border: #e5e7eb;
            --input-border: #d1d5db;
            --destructive: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, var(--background) 50%, rgba(16, 185, 129, 0.05) 100%);
            color: var(--foreground);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Login specific styles */
        .login-card {
            width: 100%;
            max-width: 28rem;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            width: 4rem;
            height: 4rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, var(--civic-blue) 0%, var(--civic-green) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--civic-blue) 0%, var(--civic-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.875rem;
            font-weight: 700;
        }

        .text-muted {
            color: var(--muted-foreground);
        }

        /* Cards */
        .card {
            background-color: var(--card);
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .card-description {
            color: var(--muted-foreground);
            font-size: 0.875rem;
        }

        .card-content {
            padding: 1.5rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: var(--muted);
            border-radius: 0.5rem;
            padding: 0.25rem;
            margin-bottom: 1.5rem;
        }

        .tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border: none;
            background: none;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted-foreground);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab.active {
            background-color: var(--background);
            color: var(--foreground);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--foreground);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--input-border);
            border-radius: 0.375rem;
            background-color: var(--background);
            color: var(--foreground);
            font-size: 0.875rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--civic-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.875rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-secondary {
            background-color: var(--civic-blue);
            color: white;
        }

        .btn-secondary:hover {
            background-color: var(--civic-blue-hover);
        }

        .btn-success {
            background-color: var(--civic-green);
            color: white;
        }

        .btn-success:hover {
            background-color: var(--civic-green-hover);
        }

        .btn-full {
            width: 100%;
        }

        /* Typography */
        .text-center {
            text-align: center;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .text-primary {
            color: var(--civic-blue);
        }

        /* Spacing */
        .mt-4 {
            margin-top: 1rem;
        }

        .mt-6 {
            margin-top: 1.5rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        /* Flexbox */
        .flex {
            display: flex;
        }

        .justify-center {
            justify-content: center;
        }

        .gap-4 {
            gap: 1rem;
        }

        .flex-wrap {
            flex-wrap: wrap;
        }

        /* Quick Navigation Links */
        .nav-quick-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--muted-foreground);
            font-size: 0.875rem;
            transition: color 0.2s ease;
        }

        .nav-quick-link:hover {
            color: var(--civic-blue);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Brand Section -->
        <div class="login-brand">
            <div class="login-icon">📍</div>
            <h1 class="gradient-text">CivicWatch</h1>
            <p class="text-muted">
                Join the community making cities better
            </p>
        </div>

        <!-- Login Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Welcome Back</h2>
                <p class="card-description">
                    Choose your login type to continue
                </p>
            </div>
            
            <div class="card-content">
                <!-- Tab Selector -->
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('user')">
                        <span>👤</span>
                        <span>Citizen</span>
                    </button>
                    <button class="tab" onclick="switchTab('admin')">
                        <span>🛡️</span>
                        <span>Admin</span>
                    </button>
                </div>

                <!-- User Login Tab -->
                <div id="userTab" class="tab-content active">
                    <form onsubmit="handleLogin(event, 'user')">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input 
                                type="email" 
                                class="form-input" 
                                placeholder="your@email.com" 
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input 
                                type="password" 
                                class="form-input" 
                                placeholder="Enter your password" 
                                required
                            >
                        </div>
                        <button type="submit" class="btn btn-secondary btn-full">
                            Sign In as Citizen
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-sm text-muted">
                            Don't have an account? 
                            <a href="#" class="text-primary" style="text-decoration: none;">
                                Sign up
                            </a>
                        </p>
                    </div>
                </div>

                <!-- Admin Login Tab -->
                <div id="adminTab" class="tab-content">
                    <form onsubmit="handleLogin(event, 'admin')">
                        <div class="form-group">
                            <label class="form-label">Admin Email</label>
                            <input 
                                type="email" 
                                class="form-input" 
                                placeholder="admin@civic.gov" 
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input 
                                type="password" 
                                class="form-input" 
                                placeholder="Enter admin password" 
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label class="form-label">Admin Access Code</label>
                            <input 
                                type="text" 
                                class="form-input" 
                                placeholder="Enter admin access code" 
                                required
                            >
                        </div>
                        <button type="submit" class="btn btn-success btn-full">
                            Sign In as Admin
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Quick Navigation -->
        <div class="text-center mt-6">
            <p class="text-sm text-muted mb-4">
                Want to explore without logging in?
            </p>
            <div class="flex justify-center gap-4 flex-wrap">
                <a href="index.html" class="nav-quick-link">
                    <span>📍</span>
                    <span>Report Issue</span>
                </a>
                <a href="leaderboard.html" class="nav-quick-link">
                    <span>🏆</span>
                    <span>Leaderboard</span>
                </a>
                <a href="social.html" class="nav-quick-link">
                    <span>👥</span>
                    <span>Community</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabType) {
            // Remove active class from all tabs and contents
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Add active class to clicked tab and corresponding content
            event.target.classList.add('active');
            document.getElementById(tabType + 'Tab').classList.add('active');
        }

        function handleLogin(event, type) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            
            console.log(`${type} login:`, data);
            alert(`${type.charAt(0).toUpperCase() + type.slice(1)} login functionality will be connected to your backend API`);
        }
    </script>
</body>
</html>
